version: '3'

vars:
  IMAGE_NAME: api-server-python
  PORT: 8000

tasks:
  # Development tasks
  setup:
    desc: Create virtual environment and install dependencies using uv
    cmds:
      - uv venv
      - uv sync
    sources:
      - pyproject.toml
      - uv.lock
    generates:
      - .venv/pyvenv.cfg

  dev:
    desc: Run the application in development mode with auto-reload
    deps: [setup]
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port {{.PORT}} --reload

  dev-direct:
    desc: Run the application using uv (no venv setup)
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port {{.PORT}} --reload

  sync:
    desc: Sync dependencies from lock file
    cmds:
      - uv sync

  lock:
    desc: Generate or update uv.lock file
    cmds:
      - uv lock

  add:
    desc: "Add a new dependency (usage: task add -- package-name)"
    cmds:
      - uv add {{.CLI_ARGS}}

  add-dev:
    desc: "Add a new development dependency (usage: task add-dev -- package-name)"
    cmds:
      - uv add --dev {{.CLI_ARGS}}

  upgrade:
    desc: Upgrade all dependencies to latest compatible versions
    cmds:
      - uv lock --upgrade

  # Docker tasks
  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.IMAGE_NAME}}:latest .
    sources:
      - Dockerfile
      - app/**/*
      - pyproject.toml
      - uv.lock

  docker:run:
    desc: Run Docker container
    deps: [docker:build]
    cmds:
      - docker run -p {{.PORT}}:{{.PORT}} {{.IMAGE_NAME}}:latest

  docker:run-detach:
    desc: Run Docker container in detached mode
    deps: [docker:build]
    cmds:
      - docker run -d -p {{.PORT}}:{{.PORT}} --name api-server-python {{.IMAGE_NAME}}:latest

  docker:pull-run:
    desc: Pull from GitHub Container Registry and run (set ORG_NAME variable)
    vars:
      ORG_NAME: '{{.ORG_NAME | default "your-org"}}'
    cmds:
      - docker pull ghcr.io/{{.ORG_NAME}}/api-server-python:latest
      - docker run -p {{.PORT}}:{{.PORT}} ghcr.io/{{.ORG_NAME}}/api-server-python:latest

  # Testing tasks
  test:
    desc: Test the /home endpoint
    cmds:
      - curl http://localhost:{{.PORT}}/home

  test-json:
    desc: Test the /home endpoint with pretty JSON output
    cmds:
      - curl -s http://localhost:{{.PORT}}/home | python3 -m json.tool

  # Utility tasks
  clean:port:
    desc: Kill process using port 8000
    cmds:
      - lsof -ti:{{.PORT}} | xargs kill -9 || true
    silent: true

  clean:docker:
    desc: Clean Docker cache and unused containers
    cmds:
      - docker system prune -f
      - docker container prune -f

  clean:venv:
    desc: Remove virtual environment
    cmds:
      - rm -rf .venv

  clean:all:
    desc: Clean everything (venv, docker, processes)
    deps: [clean:port, clean:docker, clean:venv]

  # Info tasks
  info:
    desc: Show application info and URLs
    cmds:
      - cmd: echo "Application URLs:"
      - cmd: echo "  Main app{{":"}} http{{":"}}//localhost{{":8000"}}/home"
      - cmd: echo "  API docs{{":"}} http{{":"}}//localhost{{":8000"}}/docs"
      - cmd: echo "  OpenAPI{{":"}}  http{{":"}}//localhost{{":8000"}}/openapi.json"

  status:
    desc: Check if application is running
    cmds:
      - curl -sf http://localhost:{{.PORT}}/home > /dev/null && echo "✅ Application is running" || echo "❌ Application is not responding"
    silent: true

  # Combined workflows
  start:
    desc: Start development server (full setup)
    deps: [clean:port, setup]
    cmds:
      - uv run uvicorn app.main:app --host 0.0.0.0 --port {{.PORT}} --reload

  docker:start:
    desc: Start with Docker (build and run in background)
    deps: [clean:port, docker:run-detach]
    cmds:
      - sleep 2
      - task: status

  # Default task
  default:
    desc: Show available tasks
    cmds:
      - task --list